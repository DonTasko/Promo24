<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechOfertas</title>

<style>
body { font-family: Arial; background:#f3f4f6; }
.products-grid { display:grid; grid-template-columns:1fr; gap:10px; padding:10px; }
.product-card { background:white; padding:10px; border-radius:10px; }
img { max-width:100%; height:150px; object-fit:contain; }
button { background:#FF9900; border:none; padding:10px; border-radius:20px; }
</style>

</head>
<body>

<h2 style="text-align:center;">TechOfertas</h2>

<div id="products"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzXV2COi6q6327Son0xN9pXKK3vWkmMc0FRp6m25MXzJsBbqg80GAR_qvNhP9pFW9JzWA/exec";

async function loadProducts() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        renderProducts(data);

    } catch (e) {
        document.body.innerHTML += "<p>Erro ao carregar produtos</p>";
    }
}

function renderProducts(products) {
    const container = document.getElementById("products");

    container.innerHTML = products.map(p => `
        <div class="product-card">
            <img src="${p.img}">
            <h3>${p.title}</h3>

            ${
                p.precoPromo 
                ? `<p><s>${p.preco}</s> <b>${p.precoPromo}</b></p>`
                : `<p>${p.preco}</p>`
            }

            <a href="${p.link}" target="_blank">
                <button>Ver na Amazon</button>
            </a>
        </div>
    `).join("");
}

loadProducts();
</script>

</body>
</html>
